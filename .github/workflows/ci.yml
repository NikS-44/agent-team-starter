name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        id: checkout
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        id: install
        run: pnpm install --frozen-lockfile

      - name: Verify
        id: verify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export FALLOW_CHANGED_SINCE="${{ github.event.pull_request.base.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                export FALLOW_CHANGED_SINCE="HEAD~1"
              else
                export FALLOW_CI_INITIAL_COMMIT=1
              fi
            else
              export FALLOW_CHANGED_SINCE="$BEFORE"
            fi
          fi
          pnpm verify

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node <<'NODE'
            const fs = require("node:fs");
            const p = "coverage/coverage-summary.json";
            const j = JSON.parse(fs.readFileSync(p, "utf8"));
            const t = j.total;
            const row = (name, o) => `| ${name} | ${o.pct}% | ${o.covered}/${o.total} |`;
            const md = [
              "## Test coverage (Vitest)",
              "",
              "Scope and gates: `vite.config.ts` `test.coverage` (client `src/`, excluding shadcn `components/ui` and components-demo).",
              "",
              "| Metric | Pct | Covered / Total |",
              "|--------|-----|-----------------|",
              row("Lines", t.lines),
              row("Statements", t.statements),
              row("Functions", t.functions),
              row("Branches", t.branches),
              "",
            ].join("\n");
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          NODE
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI — verify"
            echo ""
            echo "High-level run overview for this job (details remain in step logs above)."
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Checkout | ${{ steps.checkout.outcome }} |"
            echo "| Install (\`pnpm install --frozen-lockfile\`) | ${{ steps.install.outcome }} |"
            echo "| Verify (\`pnpm verify\`: typecheck, tests, lint, format, build, Fallow) | ${{ steps.verify.outcome }} |"
            echo ""
            echo "### Verify pipeline"
            echo "- **Typecheck:** \`tsgo --noEmit\`"
            echo "- **Tests:** Vitest (jsdom) with coverage thresholds (see \`test.coverage\` in \`vite.config.ts\`)"
            echo "- **Lint:** Oxlint + Biome format check"
            echo "- **Build:** \`tsgo -b\` + \`vite build\`"
            echo "- **Fallow:** audit scoped to changed files (PR base or push \`before\` SHA), or full audit locally"
            echo ""
            echo "**Event:** \`${{ github.event_name }}\` · **Ref:** \`${{ github.ref }}\` · **SHA:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
